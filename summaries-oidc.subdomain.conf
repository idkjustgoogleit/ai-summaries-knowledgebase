# OIDC-specific nginx configuration for ai-summaries-library
# Use this configuration when SSO_OIDC=TRUE for direct OIDC authentication

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name summaries.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    #split dns only lan acces but with external ssl url (https://www.linuxserver.io/blog/securing-swag)
    #include /config/nginx/internal.conf;

    include /config/nginx/maxmind-blocklist-check.conf;
    # NOTE: No Authelia wrapper for OIDC mode - app handles authentication directly

    location ^~ /public/ {
        # Optionally set expires/cache headers for static files
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Proxy to backend
        set $upstream_app summaries;
        set $upstream_port 5000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    location / {
        # Direct proxy to backend - OIDC authentication handled by app
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app summaries;
        set $upstream_port 5000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
